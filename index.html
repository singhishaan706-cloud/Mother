<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mother's Day Special 💖</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- FORM PAGE -->
  <div id="formPage">
    <div class="form-hero">
      <div style="font-size:40px">💐</div>
      <h2>Mother's Day Page</h2>
      <p class="sub">Kuch details bharo — ek special page ban jaayega!</p>
    </div>

    <div class="field">
      <label>Aap unhe kya kehte ho?</label>
      <input type="text" id="momName" placeholder="e.g. Mummy, Mumma, Maa, Amma..."/>
    </div>
    <div class="field">
      <label>Aapka naam</label>
      <input type="text" id="yourName" placeholder="Tumhara naam"/>
    </div>
    <div class="field">
      <label>3 cheezein jo aapko unke baare mein pasand hain</label>
      <textarea id="loves" placeholder="e.g. unka khana, unki smile, unka pyaar..."></textarea>
    </div>
    <div class="field">
      <label>1-2 special memories unke saath</label>
      <textarea id="memories" placeholder="e.g. jab unhone meri bimari mein raat bhar jaagi thi..."></textarea>
    </div>

    <p class="error hidden" id="errMsg"></p>
    <button class="btn" onclick="generate()">Banao mera page 💖</button>
  </div>

  <!-- RESULT PAGE -->
  <div class="hidden" id="resultPage">
    <div class="fh-row">
      <span class="fh" style="left:5%;animation-delay:0s">💕</span>
      <span class="fh" style="left:20%;animation-delay:0.5s">🌸</span>
      <span class="fh" style="left:40%;animation-delay:1s">💖</span>
      <span class="fh" style="left:62%;animation-delay:0.3s">✨</span>
      <span class="fh" style="left:80%;animation-delay:0.9s">🌷</span>
      <span class="fh" style="left:93%;animation-delay:1.4s">💕</span>
    </div>

    <div class="hero">
      <div class="big-heart">💖</div>
      <div class="hero-name" id="rName"></div>
      <div class="hero-tag" id="rTag"></div>
    </div>
    <div class="sparkle">✨ 🌸 ✨</div>

    <div class="card">
      <div class="card-title">💛 Jo cheezein mujhe aapke baare mein pasand hain</div>
      <div id="lovesList"></div>
    </div>

    <div class="card" id="memCard">
      <div class="card-title">📸 Hamare pyaare moments</div>
      <div id="memsList"></div>
    </div>

    <div class="card">
      <div class="card-title">💌 Dil se ek baat</div>
      <div class="letter-box">
        <div id="letterText"></div>
        <div class="letter-sig" id="letterSig"></div>
      </div>
    </div>

    <div class="footer" id="rFooter"></div>
    <button class="restart-btn" onclick="restart()">Naya page banao 🔄</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
