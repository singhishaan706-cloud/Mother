<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Mother's Day 💐</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-petals" aria-hidden="true">
    <span>🌸</span><span>🌺</span><span>🌷</span>
    <span>🌸</span><span>💐</span><span>🌸</span>
    <span>🌷</span><span>🌺</span><span>🌸</span>
  </div>

  <div class="container">
    <div class="header">
      <div class="crown">👑</div>
      <h1>Mother's Day<br/><span>Message Generator</span></h1>
      <p class="subtitle">Apni Maa ke liye ek special message banayein</p>
    </div>

    <div class="form-card">
      <div class="form-group">
        <label for="yourName">Aapka Naam</label>
        <input type="text" id="yourName" placeholder="e.g. Priya" />
      </div>

      <div class="form-group">
        <label for="momName">Maa ka Naam</label>
        <input type="text" id="momName" placeholder="e.g. Sunita" />
      </div>

      <div class="form-group">
        <label for="memory">Ek Pyaara Memory / Moment unke saath</label>
        <textarea id="memory" rows="3" placeholder="e.g. Jab woh raat ko chai banake mere paas baithti thi..."></textarea>
      </div>

      <div class="form-group">
        <label for="quality">Unki Sabse Khaas Quality</label>
        <input type="text" id="quality" placeholder="e.g. unka pyaar, unki strength, unki muskaan..." />
      </div>

      <div class="form-group">
        <label for="wish">Aap unke liye kya chahte ho?</label>
        <input type="text" id="wish" placeholder="e.g. hamesha khush rahein, healthy rahein..." />
      </div>

      <div class="form-group">
        <label for="language">Message ki Bhasha</label>
        <select id="language">
          <option value="hindi">Hindi</option>
          <option value="english">English</option>
          <option value="hinglish">Hinglish (Mix)</option>
        </select>
      </div>

      <button class="generate-btn" onclick="generateMessage()">
        💌 Message Generate Karo
      </button>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span>🌹</span>
        <h2>Aapka Special Message</h2>
        <span>🌹</span>
      </div>
      <div class="message-box" id="messageBox"></div>
      <div class="result-actions">
        <button class="copy-btn" onclick="copyMessage()">📋 Copy Karo</button>
        <button class="again-btn" onclick="generateAgain()">🔄 Naya Message</button>
      </div>
      <div id="copyAlert" class="copy-alert">✅ Message Copy Ho Gaya!</div>
    </div>

    <footer>
      Made with ❤️ for all the amazing Moms 🌸
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
